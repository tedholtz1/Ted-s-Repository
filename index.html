<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>March Madness Office Challenge</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background:#0f172a; color:#fff; }
    .card { background:#111827; border-radius:16px; padding:20px; margin-bottom:20px; }
    button { padding:12px 16px; border-radius:10px; border:none; font-size:16px; cursor:pointer; }
    .primary { background:#2563eb; color:white; }
    .secondary { background:#374151; color:white; }
    input, select { width:100%; padding:10px; margin-top:6px; margin-bottom:14px; border-radius:8px; border:1px solid #555; }
    #entry-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); align-items:center; justify-content:center; }
    #entry-modal .inner { background:#111827; padding:20px; border-radius:16px; width:min(92vw,420px); }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    .stat { background:#1f2937; border-radius:12px; padding:12px; min-width:120px; }
    .list-item { background:#1f2937; border-radius:10px; padding:10px; margin-bottom:8px; }
    .muted { color:#cbd5e1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>March Madness Office Challenge</h1>
    <p class="muted">Pick 2 teams. Track entries. Share with coworkers.</p>
    <div class="row">
      <button id="open-entry-modal" class="primary">Enter picks</button>
      <button id="refresh-live" class="secondary">Refresh live scores</button>
    </div>
    <p id="live-status">Starting app…</p>
    <div class="row">
      <div class="stat">Entries<br><strong id="entry-count">0</strong></div>
      <div class="stat">Games finalized<br><strong id="finalized-count">0</strong></div>
      <div class="stat">Last updated<br><strong id="last-updated">—</strong></div>
    </div>
  </div>

  <div class="card">
    <h2>Leaderboard</h2>
    <div id="leaderboard"></div>
  </div>

  <div class="card">
    <h2>Most-picked teams</h2>
    <div id="most-picked"></div>
  </div>

  <div class="card">
    <h2>Bracket status</h2>
    <div id="bracket"></div>
  </div>

  <div id="entry-modal">
    <div class="inner">
      <h3>Enter your 2 teams</h3>
      <form id="entry-form">
        <label>Your name</label>
        <input id="employee-name" type="text" required />

        <label>Team 1</label>
        <select id="team-one" required></select>

        <label>Team 2</label>
        <select id="team-two" required></select>

        <div class="row">
          <button type="button" id="cancel-entry" class="secondary">Cancel</button>
          <button type="submit" class="primary">Save picks</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
